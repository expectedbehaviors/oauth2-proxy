name: Helm chart publish

on:
  release:
    types: [published]
  workflow_run:
    workflows: ["Release oauth2-proxy chart on merge to main"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0). Default: latest release.'
        required: false

permissions:
  contents: read

jobs:
  package-and-upload:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package and upload Helm chart
        uses: expectedbehaviors/github-actions/.github/actions/helm-publish@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          chart_path: .
          chart_name: oauth2-proxy
          helm_repo_name: oauth2-proxy
          helm_repo_url: https://oauth2-proxy.github.io/manifests
          helm_repo_name_2: onepassworditem
          helm_repo_url_2: https://expectedbehaviors.github.io/OnePasswordItem-helm
          release_tag: ${{ github.event.inputs.release_tag }}
